version: '3.8'
services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dataflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dataflow
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
  kafka:
    image: bitnami/kafka:3.5
    ports:
      - "9092:9092"
